<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI Audio Studio Pro | 独立混音版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .model-card { transition: all 0.2s ease; border: 2px solid #f3f4f6; cursor: pointer; }
        .model-card.active { border-color: #4f46e5; background-color: #f5f7ff; }
        .bar { transition: width 0.5s linear; }
        .modal { transition: opacity 0.3s ease; visibility: hidden; opacity: 0; }
        .modal.active { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen p-6 md:p-12">

    <div id="mixer-modal" class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white w-[600px] max-h-[80vh] rounded-[2.5rem] p-10 shadow-2xl overflow-y-auto relative">
            <button onclick="toggleMixer(false)" class="absolute top-8 right-8 text-gray-400 hover:text-black text-2xl">✕</button>
            <h2 class="text-2xl font-black mb-2 tracking-tighter italic">🎚️ MIXER STUDIO</h2>
            <p class="text-[10px] text-gray-400 font-bold uppercase mb-8">选择已分离的轨道进行叠加合并</p>

            <div id="mixer-list" class="space-y-3">
                </div>

            <div class="mt-10 border-t pt-8">
                <button id="merge-btn" class="w-full py-5 bg-black text-white rounded-2xl font-black shadow-xl hover:scale-[1.02] active:scale-95 transition-all disabled:bg-gray-200">
                    开始导出混音成品
                </button>
                <div id="merge-result" class="mt-6 hidden"></div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto bg-white rounded-[3rem] shadow-2xl p-10 border border-gray-100">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-black text-gray-900 tracking-tighter">🎙️ AI-Audio-Studio</h1>
            <div class="flex space-x-3">
                <button id="open-mixer-btn" class="hidden bg-indigo-50 text-indigo-600 px-6 py-2 rounded-full text-xs font-black border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-all">🎚️ 混音工作室</button>
                <button id="zip-btn" class="hidden bg-black text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase shadow-lg">📦 打包 ZIP</button>
            </div>
        </div>

        <div id="drop-zone" class="border-2 border-dashed border-gray-100 rounded-[2rem] p-16 text-center hover:bg-gray-50 transition-all mb-10 cursor-pointer group">
            <div class="text-6xl mb-4 group-hover:scale-110 transition-transform">☁️</div>
            <p class="text-gray-400 font-medium">点击或拖拽音频文件到此处</p>
            <input type="file" id="file-input" multiple class="hidden">
        </div>

        <div id="file-list" class="space-y-4 mb-10"></div>

        <h2 class="text-xl font-bold mb-6 flex items-center">🤖 1. 选择 AI 模式</h2>
        <div id="model-grid" class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10"></div>

        <div class="bg-gray-50 p-8 rounded-[2rem] mb-10 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <span class="font-bold text-gray-700">分离精度 (Overlap)</span>
                <span id="overlap-val" class="text-indigo-600 font-black">0.6</span>
            </div>
            <input type="range" id="overlap-range" min="0.1" max="0.9" step="0.1" value="0.6" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none accent-indigo-600">
        </div>

        <button id="start-btn" class="w-full py-6 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all disabled:bg-gray-300">
            等待音频上传...
        </button>
    </div>

    <script>
        let selectedKey = 'roformer';
        let filesMap = {};
        let allProcessedTracks = []; // 用于混音的全局池
        let timers = {}; // 存储进度条定时器

        async function init() {
            const res = await fetch('/api/models');
            const models = await res.json();
            const grid = document.getElementById('model-grid');
            Object.keys(models).forEach(key => {
                const m = models[key];
                const card = document.createElement('div');
                card.className = `model-card p-6 rounded-3xl bg-white text-center ${key === selectedKey ? 'active' : ''}`;
                card.onclick = () => {
                    document.querySelectorAll('.model-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    selectedKey = key;
                };
                card.innerHTML = `<div class="text-[10px] text-indigo-500 font-black mb-1 uppercase">${m.tag}</div><div class="font-bold text-gray-800 text-sm">${m.name}</div>`;
                grid.appendChild(card);
            });
            updateUI();
        }

        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');
        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            Array.from(e.target.files).forEach(f => {
                const id = 'f' + Math.random().toString(36).substr(2, 7);
                filesMap[id] = { file: f, done: false };
                renderRow(id, f.name);
            });
            updateUI();
        };

        function renderRow(id, name) {
            const div = document.createElement('div');
            div.id = `row-${id}`;
            div.className = "bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm flex flex-col";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-gray-700">🎵 ${name}</span>
                    <button onclick="delFile('${id}')" class="del-btn text-gray-300 hover:text-red-500 transition-colors">🗑️</button>
                </div>
                <div class="prog-area hidden mt-4">
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden"><div class="bar bg-indigo-600 h-full w-0"></div></div>
                    <div class="flex justify-between mt-2"><span class="text-[9px] text-indigo-500 font-bold bar-text">就绪</span><span class="text-[9px] font-mono p-text">0%</span></div>
                </div>
                <div class="res-area mt-4 hidden grid grid-cols-2 gap-4 border-t pt-4"></div>
            `;
            document.getElementById('file-list').appendChild(div);
        }

        function updateUI() {
            const count = Object.keys(filesMap).length;
            startBtn.innerText = count === 0 ? "等待音频上传..." : `🚀 开始处理 (${count})`;
            startBtn.disabled = count === 0;
            if (allProcessedTracks.length > 0) {
                document.getElementById('zip-btn').classList.remove('hidden');
                document.getElementById('open-mixer-btn').classList.remove('hidden');
            }
        }

        function delFile(id) { delete filesMap[id]; document.getElementById(`row-${id}`).remove(); updateUI(); }

        // --- 核心：修复后的虚拟进度逻辑 ---
        function runFakeProgress(id) {
            let cur = 0;
            const bar = document.querySelector(`#row-${id} .bar`);
            const pText = document.querySelector(`#row-${id} .p-text`);
            const bText = document.querySelector(`#row-${id} .bar-text`);

            timers[id] = setInterval(() => {
                cur += (98 - cur) * 0.04;
                bar.style.width = cur + "%";
                pText.innerText = Math.floor(cur) + "%";
                bText.innerText = "AI 分离中...";
            }, 800);
        }

        startBtn.onclick = async () => {
            startBtn.disabled = true;
            document.querySelectorAll('.del-btn').forEach(b => b.classList.add('hidden'));

            for (const id in filesMap) {
                if (filesMap[id].done) continue;

                const item = document.getElementById(`row-${id}`);
                item.querySelector('.prog-area').classList.remove('hidden');

                // 立即启动进度条
                runFakeProgress(id);

                const fd = new FormData();
                fd.append('file', filesMap[id].file);
                fd.append('model_key', selectedKey);
                fd.append('overlap', document.getElementById('overlap-range').value);

                const res = await fetch('/api/process', { method: 'POST', body: fd });
                const { task_id } = await res.json();

                await new Promise((resolve) => {
                    const es = new EventSource(`/api/progress/${task_id}`);
                    es.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        if (data.percent >= 100) {
                            clearInterval(timers[id]); // 停止进度条
                            es.close();
                            filesMap[id].done = true;
                            allProcessedTracks.push(...data.files);

                            // 更新 UI
                            item.querySelector('.bar').style.width = "100%";
                            item.querySelector('.p-text').innerText = "100%";
                            item.querySelector('.bar-text').innerText = "完成！";

                            const resArea = item.querySelector('.res-area');
                            resArea.classList.remove('hidden');
                            data.files.forEach(f => {
                                const label = f.includes('人声') ? '🎤 人声' : (f.includes('鼓点') ? '🥁 鼓点' : (f.includes('贝斯') ? '🎻 贝斯' : '🎹 伴奏'));
                                resArea.innerHTML += `
                                    <div class="bg-gray-50 p-4 rounded-2xl flex flex-col border border-gray-100">
                                        <span class="text-[9px] font-black text-gray-400 uppercase mb-2">${label}</span>
                                        <audio controls class="w-full h-7"><source src="/outputs/${f}"></audio>
                                    </div>`;
                            });
                            updateUI();
                            resolve();
                        }
                    };
                });
            }
            startBtn.disabled = false;
        };

        // --- 混音工作室逻辑 ---
        function toggleMixer(show) {
            document.getElementById('mixer-modal').className = show ? 'modal active fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm' : 'modal fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm';
            if (show) {
                const list = document.getElementById('mixer-list');
                list.innerHTML = '';
                allProcessedTracks.forEach(f => {
                    const name = f.split('_').slice(1).join('_');
                    list.innerHTML += `
                        <label class="flex items-center p-4 bg-gray-50 rounded-2xl border border-gray-100 cursor-pointer hover:bg-indigo-50 transition-all">
                            <input type="checkbox" value="${f}" class="w-5 h-5 accent-indigo-600 mr-4">
                            <span class="text-sm font-bold text-gray-700">${name}</span>
                        </label>`;
                });
            }
        }

        document.getElementById('open-mixer-btn').onclick = () => toggleMixer(true);

        document.getElementById('merge-btn').onclick = async () => {
            const selected = Array.from(document.querySelectorAll('#mixer-list input:checked')).map(i => i.value);
            if (selected.length < 2) return alert("请至少选择两个轨道进行合并");

            const btn = document.getElementById('merge-btn');
            btn.disabled = true; btn.innerText = "⏳ 混合引擎运作中...";

            const res = await fetch('/api/merge', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ files: selected })
            });
            const data = await res.json();

            if (data.status === 'success') {
                const resDiv = document.getElementById('merge-result');
                resDiv.classList.remove('hidden');
                resDiv.innerHTML = `
                    <div class="bg-green-50 p-6 rounded-[2rem] border border-green-100">
                        <p class="text-[10px] font-black text-green-600 uppercase mb-4 text-center tracking-widest">混音导出成功</p>
                        <audio controls class="w-full mb-4"><source src="/outputs/${data.filename}"></audio>
                        <a href="/outputs/${data.filename}" download class="block text-center text-[10px] font-bold text-green-400 underline">立即下载成品</a>
                    </div>`;
                btn.disabled = false; btn.innerText = "重新混音";
            }
        };

        document.getElementById('zip-btn').onclick = async () => {
            const res = await fetch('/api/download_zip', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ files: allProcessedTracks })
            });
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = `Studio_Results.zip`;
            a.click();
        };

        init();
    </script>
</body>
</html>
